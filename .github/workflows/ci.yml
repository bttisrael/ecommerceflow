name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        shell: python
        run: |
          from pathlib import Path
          import compileall
          import py_compile
          import sys

          paths = [
              Path("backend"),
              Path("scripts"),
              Path("billing_cap_function"),
              Path("score_recent_orders_vertex.py"),
              Path("vertex_predictor_app.py"),
              Path("commerceflow_crewai_cloud_runner.py"),
              Path("prepare_vertex_model.py"),
              Path("prepare_vertex_model_v2.py"),
              Path("prepare_vertex_model_v3.py"),
              Path("create_vertex_feature_columns.py"),
              Path("make_vertex_sample.py"),
              Path("inspect_model_artifact.py"),
          ]

          ok = True
          for path in paths:
              if not path.exists():
                  continue
              if path.is_dir():
                  ok = compileall.compile_dir(str(path), quiet=1) and ok
              else:
                  try:
                      py_compile.compile(str(path), doraise=True)
                  except py_compile.PyCompileError as exc:
                      print(exc)
                      ok = False

          sys.exit(0 if ok else 1)

  docker-builds:
    name: Docker build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs:
      - frontend
      - python-syntax

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: Dockerfile
          - name: scoring
            dockerfile: Dockerfile.score

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
