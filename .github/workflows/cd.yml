name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: Deploy frontend to Vercel
        required: true
        default: true
        type: boolean
      deploy_backend:
        description: Deploy FastAPI backend to Cloud Run
        required: true
        default: true
        type: boolean
      deploy_scoring:
        description: Deploy daily scoring Cloud Run Job
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: otimizador-cargas
  GCP_REGION: us-central1
  GAR_REPOSITORY: cloud-run-source-deploy
  RUNTIME_SERVICE_ACCOUNT: commerceflow-runner@otimizador-cargas.iam.gserviceaccount.com
  BACKEND_SERVICE: ecommerceflow-api
  BACKEND_IMAGE: us-central1-docker.pkg.dev/otimizador-cargas/cloud-run-source-deploy/ecommerceflow-api
  SCORING_JOB: ecommerceflow-vertex-scoring
  SCORING_IMAGE: us-central1-docker.pkg.dev/otimizador-cargas/cloud-run-source-deploy/ecommerceflow-vertex-scoring

jobs:
  preflight:
    name: Deployment preflight
    runs-on: ubuntu-latest
    outputs:
      deploy_frontend: ${{ steps.check.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.check.outputs.deploy_backend }}
      deploy_scoring: ${{ steps.check.outputs.deploy_scoring }}
      frontend_ready: ${{ steps.check.outputs.frontend_ready }}
      gcp_ready: ${{ steps.check.outputs.gcp_ready }}

    steps:
      - name: Check deployment secrets
        id: check
        shell: bash
        env:
          DEPLOY_FRONTEND: ${{ github.event_name == 'push' || github.event.inputs.deploy_frontend == 'true' }}
          DEPLOY_BACKEND: ${{ github.event_name == 'push' || github.event.inputs.deploy_backend == 'true' }}
          DEPLOY_SCORING: ${{ github.event_name == 'push' || github.event.inputs.deploy_scoring == 'true' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail

          frontend_missing=()
          gcp_missing=()

          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name:-}" ]; then
              frontend_missing+=("$name")
            fi
          done

          for name in GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!name:-}" ]; then
              gcp_missing+=("$name")
            fi
          done

          frontend_ready=true
          gcp_ready=true
          if [ "${#frontend_missing[@]}" -gt 0 ]; then
            frontend_ready=false
          fi
          if [ "${#gcp_missing[@]}" -gt 0 ]; then
            gcp_ready=false
          fi

          echo "deploy_frontend=$DEPLOY_FRONTEND" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$DEPLOY_BACKEND" >> "$GITHUB_OUTPUT"
          echo "deploy_scoring=$DEPLOY_SCORING" >> "$GITHUB_OUTPUT"
          echo "frontend_ready=$frontend_ready" >> "$GITHUB_OUTPUT"
          echo "gcp_ready=$gcp_ready" >> "$GITHUB_OUTPUT"

          if [ "$DEPLOY_FRONTEND" = "true" ] && [ "$frontend_ready" != "true" ]; then
            echo "::warning::Skipping frontend deploy. Missing GitHub Secrets: ${frontend_missing[*]}"
          fi
          if { [ "$DEPLOY_BACKEND" = "true" ] || [ "$DEPLOY_SCORING" = "true" ]; } && [ "$gcp_ready" != "true" ]; then
            echo "::warning::Skipping GCP deploys. Missing GitHub Secrets: ${gcp_missing[*]}"
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            failed=false
            if [ "$DEPLOY_FRONTEND" = "true" ] && [ "$frontend_ready" != "true" ]; then
              echo "::error::Cannot deploy frontend until these GitHub Secrets exist: ${frontend_missing[*]}"
              failed=true
            fi
            if { [ "$DEPLOY_BACKEND" = "true" ] || [ "$DEPLOY_SCORING" = "true" ]; } && [ "$gcp_ready" != "true" ]; then
              echo "::error::Cannot deploy GCP resources until these GitHub Secrets exist: ${gcp_missing[*]}"
              failed=true
            fi
            if [ "$failed" = "true" ]; then
              exit 1
            fi
          fi

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment: production
    needs:
      - preflight
    if: needs.preflight.outputs.deploy_frontend == 'true' && needs.preflight.outputs.frontend_ready == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: production
    needs:
      - preflight
    if: needs.preflight.outputs.deploy_backend == 'true' && needs.preflight.outputs.gcp_ready == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "$BACKEND_SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --platform=managed \
            --image="$BACKEND_IMAGE:${GITHUB_SHA}" \
            --allow-unauthenticated \
            --service-account="$RUNTIME_SERVICE_ACCOUNT" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=10 \
            --concurrency=80 \
            --timeout=300 \
            --set-env-vars="BIGQUERY_ORDERS_TABLE=otimizador-cargas.commerce_raw.orders,PREDICTIONS_TABLE=otimizador-cargas.commerce_gold.delay_risk_predictions,BIGQUERY_INGESTION_ENABLED=true,BIGQUERY_INSERT_CHUNK_SIZE=3000,ORDERS_PER_BATCH=3000,SIMULATION_MINUTES=240,MAX_ORDERS_PER_BATCH=3000,AUTO_START_SIMULATION=false,GENERATE_INITIAL_BATCH=false,BIGQUERY_PREDICTIONS_ENABLED=true,PREDICTIONS_CACHE_SECONDS=900,BIGQUERY_MAX_BYTES_BILLED=50000000"

  deploy-scoring:
    name: Deploy daily scoring job
    runs-on: ubuntu-latest
    environment: production
    needs:
      - preflight
    if: needs.preflight.outputs.deploy_scoring == 'true' && needs.preflight.outputs.gcp_ready == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push scoring image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.score
          push: true
          tags: |
            ${{ env.SCORING_IMAGE }}:${{ github.sha }}
            ${{ env.SCORING_IMAGE }}:latest
          cache-from: type=gha,scope=scoring-prod
          cache-to: type=gha,mode=max,scope=scoring-prod

      - name: Update Cloud Run scoring job
        run: |
          gcloud run jobs update "$SCORING_JOB" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$SCORING_IMAGE:${GITHUB_SHA}" \
            --service-account="$RUNTIME_SERVICE_ACCOUNT" \
            --tasks=1 \
            --max-retries=0 \
            --task-timeout=3600s \
            --cpu=1 \
            --memory=1Gi \
            --set-env-vars="PROJECT_ID=otimizador-cargas,REGION=us-central1,SCORING_MODE=local,SCORING_ENABLED=true,ALLOW_VERTEX_ENDPOINT=false,REFRESH_FEATURES_BEFORE_SCORING=true,RAW_ORDERS_TABLE=otimizador-cargas.commerce_raw.orders,SILVER_ORDERS_TABLE=otimizador-cargas.commerce_silver.orders_cleaned,FEATURE_TABLE=otimizador-cargas.commerce_gold.delay_risk_features,PREDICTIONS_TABLE=otimizador-cargas.commerce_gold.delay_risk_predictions,FEATURE_COLUMNS_GCS=gs://commerceflow-ml-artifacts-otimizador-cargas/commerceflow/vertex_custom_model/v1/feature_columns.json,MODEL_GCS_URI=gs://commerceflow-ml-artifacts-otimizador-cargas/commerceflow/vertex_custom_model/v1,MODEL_VERSION=commerceflow-delay-risk-vertex-registry-daily-v1,BATCH_SIZE=300,DAILY_SCORING_LIMIT=300,SCORING_LOOKBACK_DAYS=7,BIGQUERY_MAX_BYTES_BILLED=50000000,FEATURE_REFRESH_MAX_BYTES_BILLED=2000000000,PREDICTIONS_INSERT_CHUNK_SIZE=300"
